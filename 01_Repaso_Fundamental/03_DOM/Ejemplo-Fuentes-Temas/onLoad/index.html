<!DOCTYPE html>
<html lang="es">
  <head>
    <title>UNIR hoy - Modo Oscuro con Bootstrap (window.onload)</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">

    <!--
      ✅ El script está en el <head> usando window.onload.

      window.onload se dispara cuando la página entera ha cargado:
      el DOM, las imágenes, las hojas de estilo externas, los iframes...
      todo. Es la forma más "completa" de esperar, pero también
      la más tardía: si hay imágenes pesadas, el código tarda más en ejecutarse.

      Diferencia clave con DOMContentLoaded:
        - DOMContentLoaded → espera solo el HTML/DOM (más rápido)
        - window.onload    → espera el HTML + todos los recursos (más lento)

      Para manipular el DOM, DOMContentLoaded o defer suelen ser
      preferibles. window.onload se usa cuando necesitas que los recursos
      (imágenes, canvas, etc.) estén disponibles antes de ejecutar el código.
    -->
    <script src="script.js"></script>
  </head>
  <body>
    <div class="banner">
      <h1>UNIR Hoy</h1>
      <p class="badge-tecnica">Técnica: window.onload</p>
    </div>
    <div class="container py-4">
      <div class="row mb-3">
        <div class="col">
          <div class="custom-control custom-switch">
            <input type="checkbox" class="custom-control-input" id="darkSwitch">
            <label class="custom-control-label" for="darkSwitch">Cambiar a Modo Oscuro</label>
          </div>
        </div>
        <div class="col">
          <label for="textSize"> Tamaño del texto</label>
          <select id="textSize" class="form-control">
            <option value="text-small">Pequeño</option>
            <option value="text-medium" selected>Mediano</option>
            <option value="text-large">Grande</option>
          </select>
        </div>
      </div>

      <div class="mt-4">
        <h2>Últimas Noticias</h2>
        <p>Entérate de las últimas noticias en las asignaturas de tu titulación...</p>
      </div>

      <div class="mt-4">
        <h2>Suscríbete</h2>
        <p>Suscríbete para recibir las últimas noticias en tu correo electrónico @comunidadunir.</p>
        <input type="email" class="form-control" placeholder="Tu correo electrónico">
        <button class="btn btn-primary mt-2">Suscribirse</button>
      </div>
    </div>

    <div class="footer">
      <p>&copy; 2026 UNIR - Todos los derechos reservados</p>
    </div>
  </body>
</html>
